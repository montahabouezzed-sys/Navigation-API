<script>
document.addEventListener("DOMContentLoaded", function() {
    var posData = [[50.71, 7.09], [50.7103, 7.0902], [50.7106, 7.09045], [50.7109, 7.0907], [50.7112, 7.09095], [50.7115, 7.0912], [50.7118, 7.09145], [50.7121, 7.0917], [50.7124, 7.09195], [50.7127, 7.0922]];
    var brgData = [22.8875709374783, 27.82050374662822, 27.8203524019911, 27.82020105544757, 27.820049707498924, 27.81989835940027, 27.819747009395144, 27.8195956582357, 27.81944430767834, 27.81944430767834];
    var map = map_26c0b34fefb7622105725d054cc6cdd5;

    var idx = 0;
    var isPlaying = false;

    // Initial Marker and Trail
    var mainMarker = L.marker(posData[0]).addTo(map);
    var trail = L.polyline([posData[0]], {color: 'cyan', weight: 3}).addTo(map);

    var headIcon = L.divIcon({
        className: 'arrow-parent',
        html: '<div class="arrow-icon" id="arrow"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });
    var headMarker = L.marker(posData[0], {icon: headIcon}).addTo(map);

    function step() {
        if (!isPlaying || idx >= posData.length - 1) {
            isPlaying = false;
            return;
        }
        idx++;
        var p = posData[idx];
        var b = brgData[idx];

        mainMarker.setLatLng(p);
        headMarker.setLatLng(p);

        // Rotate the arrow
        var el = document.getElementById('arrow');
        if (el) el.style.transform = "rotate(" + b + "deg)";

        trail.addLatLng(p);
        map.panTo(p);

        setTimeout(step, 300);
    }

    var Control = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
            var btn = L.DomUtil.create('div', 'play-btn-ctrl');
            btn.innerHTML = '▶ Play Path';
            btn.onclick = function() {
                if (!isPlaying) {
                    isPlaying = true;
                    step();
                }
            };
            return btn;
        }
    });
    map.addControl(new Control());
});
</script>
